<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>MATABASE // ICYTHECOOLEST</title>
    <style>
        :root {
            --neon-green: #00ff41;
            --bg-black: #050505;
            --galaxy: #6a0dad;
        }

        body {
            background-color: var(--bg-black);
            color: var(--neon-green);
            font-family: 'Courier New', monospace;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            background-image: radial-gradient(circle at center, #111 0%, #000 100%);
        }

        .profile-card {
            border: 1px solid var(--neon-green);
            background: rgba(0, 0, 0, 0.9);
            padding: 30px;
            width: 400px;
            box-shadow: 0 0 20px rgba(0, 255, 65, 0.2);
        }

        .header {
            border-bottom: 1px solid var(--neon-green);
            padding-bottom: 10px;
            margin-bottom: 20px;
            font-size: 1.5rem;
            letter-spacing: 2px;
        }

        .user-info { margin-bottom: 20px; }
        .label { color: #888; font-size: 0.8rem; }

        .cosmetics-list {
            list-style: none;
            padding: 0;
            margin: 0;
            max-height: 200px;
            overflow-y: auto;
            border-left: 2px solid var(--galaxy);
            padding-left: 15px;
        }

        .cosmetic-item {
            padding: 5px 0;
            border-bottom: 1px solid #1a1a1a;
            font-size: 0.9rem;
        }

        .cosmetic-item::before {
            content: "> ";
            color: var(--galaxy);
        }

        #loading { animation: blink 1s infinite; }
        @keyframes blink { 0% { opacity: 0; } 50% { opacity: 1; } 100% { opacity: 0; } }
    </style>
</head>
<body>

    <div class="profile-card">
        <div class="header">MATABASE_SCAN</div>
        
        <div class="user-info">
            <span class="label">IDENT_NAME:</span><br>
            <strong>ICYTHECOOLEST</strong>
        </div>

        <div class="user-info">
            <span class="label">COSMETICS_MANIFEST:</span>
            <ul id="cosmetics-list" class="cosmetics-list">
                <li id="loading">FETCHING_DATA...</li>
            </ul>
        </div>
    </div>

    <script>
        async function loadProfile() {
            const list = document.getElementById('cosmetics-list');
            // Using the API you provided
            const api = "https://www.questfemboys.xyz/api/users/add?username=ICYTHECOOLEST";

            try {
                const response = await fetch(api);
                const data = await response.json();

                // Clear loading text
                list.innerHTML = "";

                // If the API returns an object with cosmetics (adjust keys if different)
                // Example assuming the API returns { "cosmetics": ["hat", "glasses"] }
                const items = data.cosmetics || ["No items detected"];

                items.forEach(item => {
                    const li = document.createElement('li');
                    li.className = "cosmetic-item";
                    li.innerText = item.replace(/_/g, " ").toUpperCase();
                    list.appendChild(li);
                });

            } catch (err) {
                list.innerHTML = "<li style='color:red'>ERR: UNAVILABLE_PROTOCOL</li>";
            }
        }

        loadProfile();
    </script>
</body>
</html>
