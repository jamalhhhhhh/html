<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>MATABASE // TARGET: ICYTHECOOLEST</title>
    <style>
        :root {
            --neon-blue: #00d2ff;
            --matrix-green: #00ff41;
            --void-bg: #050505;
        }

        body {
            background-color: var(--void-bg);
            color: var(--matrix-green);
            font-family: 'Courier New', Courier, monospace;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            background-image: linear-gradient(rgba(0, 255, 65, 0.05) 1px, transparent 1px),
                              linear-gradient(90deg, rgba(0, 255, 65, 0.05) 1px, transparent 1px);
            background-size: 20px 20px;
        }

        .terminal {
            border: 1px solid var(--matrix-green);
            padding: 30px;
            background: rgba(0, 0, 0, 0.9);
            box-shadow: 0 0 20px rgba(0, 255, 65, 0.2);
            width: 450px;
        }

        .header {
            border-bottom: 1px solid var(--matrix-green);
            margin-bottom: 15px;
            padding-bottom: 5px;
            font-weight: bold;
            color: var(--neon-blue);
        }

        .stat-line { margin: 10px 0; }
        .label { color: #888; }
        
        .cosmetic-tag {
            display: inline-block;
            border: 1px solid var(--matrix-green);
            padding: 2px 8px;
            margin: 3px;
            font-size: 0.8rem;
            background: rgba(0, 255, 65, 0.1);
        }

        #sync-pulse {
            float: right;
            animation: blink 1s infinite;
        }

        @keyframes blink { 0% { opacity: 0; } 50% { opacity: 1; } 100% { opacity: 0; } }
    </style>
</head>
<body>

<div class="terminal">
    <div class="header">
        [ SYSTEM SCAN ] <span id="sync-pulse">● SYNCING</span>
    </div>
    
    <div class="stat-line">
        <span class="label">IDENT_NAME:</span> ICYTHECOOLEST
    </div>
    <div class="stat-line">
        <span class="label">REGISTRY:</span> questfemboys.xyz/v1
    </div>
    
    <div id="cosmetics-output">
        <span class="label">DATA:</span> INITIALIZING_STREAM...
    </div>
</div>

<script>
    async function fetchCosmetics() {
        const output = document.getElementById('cosmetics-output');
        // NOTE: I am using the 'add' endpoint as you provided, 
        // but typically you'd use a 'get' or 'profile' endpoint.
        const API_URL = "https://www.questfemboys.xyz/api/users/add?username=ICYTHECOOLEST";

        try {
            const response = await fetch(API_URL);
            const data = await response.json();

            // Logic to handle how the API returns cosmetics
            // If the API returns a 'cosmetics' array:
            let cosmeticHtml = '<br><span class="label">EQUIPPED_ITEMS:</span><br>';
            
            if (data.cosmetics && data.cosmetics.length > 0) {
                data.cosmetics.forEach(item => {
                    cosmeticHtml += `<span class="cosmetic-tag">${item.toUpperCase()}</span>`;
                });
            } else {
                cosmeticHtml += "NO_COSMETICS_FOUND";
            }

            output.innerHTML = cosmeticHtml;

        } catch (err) {
            output.innerHTML = "<br><span style='color:red'>ERR: CONNECTION_REFUSED</span>";
        }
    }

    // Auto-run on load
    fetchCosmetics();
</script>

</body>
</html>
