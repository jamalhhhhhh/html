<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>MATABASE // ICYTHECOOLEST_SCAN</title>
    <style>
        :root {
            --neon-green: #00ff41;
            --matrix-fade: #003b00;
            --void: #050505;
            --alert: #ff003c;
        }

        body {
            background-color: var(--void);
            color: var(--neon-green);
            font-family: 'Courier New', monospace;
            margin: 20px;
            display: grid;
            grid-template-columns: 1fr 1fr;
            grid-gap: 20px;
            background-image: linear-gradient(var(--matrix-fade) 1px, transparent 1px);
            background-size: 100% 3px;
        }

        .window {
            border: 1px solid var(--neon-green);
            background: rgba(0, 0, 0, 0.9);
            padding: 15px;
            box-shadow: 0 0 10px rgba(0, 255, 65, 0.1);
        }

        .full-width { grid-column: span 2; }
        .title { 
            background: var(--neon-green); 
            color: black; 
            padding: 2px 10px; 
            font-weight: bold; 
            margin-bottom: 10px;
            display: inline-block;
        }

        ul { list-style: none; padding: 0; }
        li { margin: 5px 0; padding-left: 15px; border-left: 2px solid var(--neon-green); }
        
        .loading { animation: blink 0.8s infinite; color: var(--alert); }
        @keyframes blink { 0% { opacity: 0; } 50% { opacity: 1; } 100% { opacity: 0; } }

        .tag { color: #888; font-size: 0.8rem; text-transform: uppercase; }
    </style>
</head>
<body>

    <div class="window full-width">
        <div class="title">SYSTEM_CORE</div>
        <div>TARGET_ID: <span id="user-name">LOADING...</span></div>
        <div>API_ENDPOINT: questfemboys.xyz/api/v1</div>
        <div id="status" class="loading">ESTABLISHING_UPLINK...</div>
    </div>

    <div class="window">
        <div class="title">COSMETICS_INVENTORY</div>
        <ul id="cosmetic-list">
            </ul>
    </div>

    <div class="window">
        <div class="title">METADATA_EXTRACT</div>
        <ul id="meta-list">
            </ul>
    </div>

    <script>
        async function runScan() {
            const api = "https://www.questfemboys.xyz/api/users/add?username=ICYTHECOOLEST";
            
            try {
                const response = await fetch(api);
                const data = await response.json();

                // Update Header
                document.getElementById('user-name').innerText = data.username || "ICYTHECOOLEST";
                document.getElementById('status').innerText = "CONNECTION_STABLE // DATA_SORTED";
                document.getElementById('status').classList.remove('loading');

                const cosmeticContainer = document.getElementById('cosmetic-list');
                const metaContainer = document.getElementById('meta-list');

                // Clear placeholders
                cosmeticContainer.innerHTML = "";
                metaContainer.innerHTML = "";

                // LOOP & MATCH LOGIC
                Object.entries(data).forEach(([key, value]) => {
                    // Match Cosmetics (Hats, Badges, etc)
                    if (key.includes('cosmetic') || key.includes('hat') || Array.isArray(value)) {
                        const items = Array.isArray(value) ? value : [value];
                        items.forEach(item => {
                            cosmeticContainer.innerHTML += `<li><span class="tag">${key}:</span> ${item}</li>`;
                        });
                    } 
                    // Match everything else as Metadata
                    else if (key !== 'username') {
                        metaContainer.innerHTML += `<li><span class="tag">${key}:</span> ${value}</li>`;
                    }
                });

            } catch (err) {
                document.getElementById('status').innerText = "ERROR: BYPASS_FAILED";
            }
        }

        runScan();
    </script>
</body>
</html>
