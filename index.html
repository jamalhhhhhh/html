<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>MATABASE // DATA_DUMP: ICYTHECOOLEST</title>
    <style>
        :root {
            --neon-green: #00ff41;
            --deep-purple: #240046;
            --void: #020202;
        }

        body {
            background-color: var(--void);
            color: var(--neon-green);
            font-family: 'Courier New', Courier, monospace;
            padding: 20px;
            background-image: radial-gradient(circle at center, #111 0%, #000 100%);
        }

        .grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
            gap: 20px;
        }

        .terminal-box {
            border: 1px solid var(--neon-green);
            padding: 15px;
            background: rgba(0, 0, 0, 0.85);
            box-shadow: 0 0 15px rgba(0, 255, 65, 0.1);
        }

        .title {
            background: var(--neon-green);
            color: black;
            padding: 2px 8px;
            font-weight: bold;
            display: inline-block;
            margin-bottom: 10px;
        }

        .data-line {
            margin: 4px 0;
            border-bottom: 1px solid #111;
            display: flex;
            justify-content: space-between;
        }

        .key { color: #888; font-size: 0.8rem; text-transform: uppercase; }
        .val { color: var(--neon-green); font-weight: bold; }

        #raw-dump {
            font-size: 0.7rem;
            color: #555;
            word-break: break-all;
            margin-top: 20px;
            border-top: 1px dashed #333;
            padding-top: 10px;
        }
    </style>
</head>
<body>

    <h1>> MATABASE_v2 // ICYTHECOOLEST</h1>

    <div class="grid">
        <div class="terminal-box">
            <div class="title">USER_REGISTRY</div>
            <div id="registry-data">SCANNING...</div>
        </div>

        <div class="terminal-box">
            <div class="title">COSMETIC_MANIFEST</div>
            <div id="cosmetic-data">INITIALIZING...</div>
        </div>

        <div class="terminal-box">
            <div class="title">SYSTEM_METADATA</div>
            <div id="meta-data">AWAITING...</div>
        </div>
    </div>

    <div id="raw-dump">RAW_API_STRING: </div>

    <script>
        async function fullDataDump() {
            const api = "https://www.questfemboys.xyz/api/users/add?username=ICYTHECOOLEST";
            
            try {
                const response = await fetch(api);
                const data = await response.json();

                // Show the raw string at the bottom for debugging
                document.getElementById('raw-dump').innerText += JSON.stringify(data);

                const registry = document.getElementById('registry-data');
                const cosmetics = document.getElementById('cosmetic-data');
                const meta = document.getElementById('meta-data');

                registry.innerHTML = "";
                cosmetics.innerHTML = "";
                meta.innerHTML = "";

                // THE LOGIC: Sort every single key in the API
                Object.entries(data).forEach(([key, value]) => {
                    const line = `<div class="data-line"><span class="key">${key}:</span><span class="val">${value}</span></div>`;

                    // 1. Sort into Registry (ID, Username, Dates)
                    if (['username', 'id', 'created_at', 'last_login'].includes(key.toLowerCase())) {
                        registry.innerHTML += line;
                    } 
                    // 2. Sort into Cosmetics (Anything related to items or lists)
                    else if (key.toLowerCase().includes('cosmetic') || Array.isArray(value) || key.includes('item')) {
                        cosmetics.innerHTML += line;
                    } 
                    // 3. Everything else goes into Meta
                    else {
                        meta.innerHTML += line;
                    }
                });

            } catch (err) {
                console.error(err);
                document.body.innerHTML += "<h2 style='color:red; text-align:center'>CRITICAL_ERROR: API_OFFLINE</h2>";
            }
        }

        fullDataDump();
    </script>
</body>
</html>
